<div class="animate-pulse flex flex-col gap-6">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div class="space-y-3">
      <div class="h-3 w-28 rounded skelton-grediant"></div>

      <div class="h-8 w-56 rounded skelton-grediant"></div>

      <div class="h-4 w-80 rounded skelton-grediant"></div>
    </div>

    <div class="h-12 w-40 rounded-lg skelton-grediant"></div>
  </div>

  <div class="bg-white rounded-xl p-6 border border-neutral-100">
    <div class="grid grid-cols-[60px_2fr_2fr_120px_40px] items-center pb-4 border-b border-neutral-100">
      <div class="h-3 w-6 rounded skelton-grediant"></div>

      <div class="h-3 w-20 rounded skelton-grediant"></div>

      <div class="h-3 w-20 rounded skelton-grediant"></div>

      <div class="h-3 w-14 rounded skelton-grediant"></div>

      <div class="h-3 w-4 rounded skelton-grediant justify-self-end"></div>
    </div>

    @for (row of rows; track row) {
      <div
        class="grid grid-cols-[60px_2fr_2fr_120px_40px] items-center py-5 border-b last:border-b-0 border-neutral-100"
      >
        <div class="w-10 h-10 rounded-xl skelton-grediant"></div>

        <div class="h-4 w-40 rounded skelton-grediant"></div>

        <div class="h-4 w-36 rounded skelton-grediant"></div>

        <div class="h-8 w-16 rounded-full skelton-grediant"></div>

        <div class="h-6 w-6 rounded skelton-grediant justify-self-end"></div>
      </div>
    }
  </div>
</div>
