<app-form-layout
  title="Create your workspace"
  description="Join the editorial approach to task management."
  mobileDescription="Join the curated environment for institutional trust and task precision."
  contentClass="max-w-xl p-6 md:p-12"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="flex flex-col gap-6">
      <app-input
        label="Name"
        placeholder="Enter your full name"
        type="text"
        formControlName="name"
        [errorMessage]="getError('name')"
        hint="3-50 characters, letters only."
      />

      <app-input
        label="Email"
        placeholder="yourname@company.com"
        type="email"
        formControlName="email"
        [errorMessage]="getError('email')"
      />

      <app-input
        label="Job Title"
        placeholder="e.g. Project Manager"
        type="text"
        formControlName="job_title"
        [optional]="true"
      />

      <div class="flex flex-col gap-6 md:flex-row md:justify-between">
        <app-input
          class="flex-1"
          label="Password"
          placeholder="Password"
          type="password"
          formControlName="password"
          [showPasswordToggle]="true"
          [errorMessage]="getError('password')"
        />

        <app-input
          class="flex-1"
          label="Confirm Password"
          placeholder="Repeat your password"
          type="password"
          formControlName="confirmPassword"
          [errorMessage]="getError('confirmPassword')"
        />
      </div>

      <app-password-hints [hints]="hints" />

      <button class="btn btn-primary">
        @if (isLoading) {
          <span>Loading...</span>
        } @else {
          <span>Create Account</span>
        }
      </button>
    </div>
  </form>

  <div class="pt-8 flex gap-1 justify-center">
    <span class="text-neutral-mid text-xs weight-regular leading-xs"> Already have an account? </span>

    <a class="text-primary text-xs weight-semibold leading-xs" routerLink="/login"> Log in </a>
  </div>
</app-form-layout>
