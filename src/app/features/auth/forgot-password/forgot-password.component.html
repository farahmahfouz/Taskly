@if (isMobile) {
  <app-form-layout
    title="Forgot password?"
    description="No worries, we'll send you reset instructions."
    contentClass="p-6 md:p-10"
    titleClass="text-center md:text-start"
    descriptionClass="text-center md:text-start"
    containerClass="bg-white"
    hightClass="min-h-auto pb-6"
  >
    <div header class="bg-surface-highest w-12 h-12 rounded-xl m-auto flex justify-center items-center mb-6">
      <svg icon-forgot-password class="size-5 text-primary"></svg>
    </div>
    <div class="flex flex-col gap-6">
      <app-input label="Email Address" placeholder="Enter your email" type="email" formControlName="email" />

      <button class="btn btn-primary w-full">Send Reset Link</button>

      <a class="flex items-center justify-center gap-2 text-primary text-xs weight-medium cursor-pointer">
        <svg icon-arrow-back class="size-3 text-primary"></svg>
        <span>Back to log in</span>
      </a>
    </div>
  </app-form-layout>

  <div class="bg-[#82F9BE4D] flex flex-col gap-3 mx-6 md:mx-0 p-4 pb-0">
    <div class="flex items-start gap-2 rounded-lg">
     <svg icon-check-circle class="size-5 text-green"></svg>

      <p class="text-green text-xs leading-5">
        If an account exists with this email, we've sent a password reset link.
      </p>
    </div>
    <div class="flex justify-center items-center gap-4 border-t border-[#C3C6D626] py-3">
      <p class="text-center text-2xs uppercase text-[#00523599] weight-bold tracking-wide">Didn't receive email?</p>

      <button class="flex h-6 items-center justify-center text-primary weight-bold tracking-wide" disabled>
        Resend in 05:00
      </button>
    </div>
  </div>
} @else {
  <app-form-layout
    title="Forgot password?"
    description="No worries, we'll send you reset instructions."
    contentClass="p-6 md:p-10"
    titleClass="text-center md:text-start"
    descriptionClass="text-center md:text-start"
    containerClass="bg-white"
  >
    <div class="flex flex-col gap-6">
      <app-input label="Email Address" placeholder="Enter your email" type="email" formControlName="email" />

      <button class="btn btn-primary w-full">Send Reset Link</button>

      <a class="flex items-center justify-center gap-2 text-primary text-xs weight-medium cursor-pointer">
        <svg icon-arrow-back class="size-4 text-primary"></svg>

        <span>Back to log in</span>
      </a>
    </div>

    <!-- Bottom Section -->
    <div class="mt-10 border-t border-[#C3C6D626] pt-10 flex flex-col gap-8">
      <div class="flex items-start gap-3 rounded-lg bg-success/15 px-5 py-4">
        <svg icon-check-circle class="size-5 text-green"></svg>

        <p class="text-green text-xs leading-5">
          If an account exists with this email, we've sent a password reset link.
        </p>
      </div>

      <!-- Resend -->
      <div class="flex flex-col gap-4">
        <p class="text-center text-[16px] uppercase tracking-[1px] weight-bold text-[#434654]">
          Didn't receive the email?
        </p>

        <button
          class="flex h-12 w-full items-center justify-center gap-2 rounded-lg bg-surface-low text-[#737685] weight-medium"
          disabled
        >
          <svg icon-clock class="w-4.5 h-5 text-[#737685]"></svg>
          <span>Resend in 05:00</span>
        </button>
      </div>
    </div>
  </app-form-layout>
}
