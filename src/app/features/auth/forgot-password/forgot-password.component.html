@if (isMobile) {
  <app-form-layout
    title="Forgot password?"
    description="No worries, we'll send you reset instructions."
    contentClass="p-6 md:p-10"
    titleClass="text-center md:text-start"
    descriptionClass="text-center md:text-start"
    containerClass="bg-white"
    hightClass="min-h-auto pb-6"
  >
    <div header class="bg-surface-highest w-12 h-12 rounded-xl m-auto flex justify-center items-center mb-6">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M10 20C8.61667 20 7.31667 19.7375 6.1 19.2125C4.88333 18.6875 3.825 17.975 2.925 17.075C2.025 16.175 1.3125 15.1167 0.7875 13.9C0.2625 12.6833 0 11.3833 0 10H2C2 11.1 2.20833 12.1375 2.625 13.1125C3.04167 14.0875 3.6125 14.9375 4.3375 15.6625C5.0625 16.3875 5.9125 16.9625 6.8875 17.3875C7.8625 17.8125 8.9 18.025 10 18.025C12.2333 18.025 14.125 17.25 15.675 15.7C17.225 14.15 18 12.2583 18 10.025C18 7.79167 17.225 5.9 15.675 4.35C14.125 2.8 12.2333 2.025 10 2.025C8.51667 2.025 7.17083 2.3875 5.9625 3.1125C4.75417 3.8375 3.8 4.8 3.1 6H6V8H0V2H2V4C2.91667 2.78333 4.06667 1.8125 5.45 1.0875C6.83333 0.3625 8.35 0 10 0C11.3833 0 12.6833 0.2625 13.9 0.7875C15.1167 1.3125 16.175 2.025 17.075 2.925C17.975 3.825 18.6875 4.88333 19.2125 6.1C19.7375 7.31667 20 8.61667 20 10C20 11.3833 19.7375 12.6833 19.2125 13.9C18.6875 15.1167 17.975 16.175 17.075 17.075C16.175 17.975 15.1167 18.6875 13.9 19.2125C12.6833 19.7375 11.3833 20 10 20ZM8 14C7.71667 14 7.47917 13.9042 7.2875 13.7125C7.09583 13.5208 7 13.2833 7 13V10C7 9.71667 7.09583 9.47917 7.2875 9.2875C7.47917 9.09583 7.71667 9 8 9V8C8 7.45 8.19583 6.97917 8.5875 6.5875C8.97917 6.19583 9.45 6 10 6C10.55 6 11.0208 6.19583 11.4125 6.5875C11.8042 6.97917 12 7.45 12 8V9C12.2833 9 12.5208 9.09583 12.7125 9.2875C12.9042 9.47917 13 9.71667 13 10V13C13 13.2833 12.9042 13.5208 12.7125 13.7125C12.5208 13.9042 12.2833 14 12 14H8ZM9 9H11V8C11 7.71667 10.9042 7.47917 10.7125 7.2875C10.5208 7.09583 10.2833 7 10 7C9.71667 7 9.47917 7.09583 9.2875 7.2875C9.09583 7.47917 9 7.71667 9 8V9Z"
          fill="#0052CC"
        />
      </svg>
    </div>
    <div class="flex flex-col gap-6">
      <app-input label="Email Address" placeholder="Enter your email" type="email" formControlName="email" />

      <button class="btn btn-primary w-full">Send Reset Link</button>

      <a class="flex items-center justify-center gap-2 text-primary text-xs weight-medium cursor-pointer">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3.825 9L9.425 14.6L8 16L0 8L8 0L9.425 1.4L3.825 7H16V9H3.825Z" fill="currentColor" />
        </svg>

        <span>Back to log in</span>
      </a>
    </div>
  </app-form-layout>

  <div class="bg-[#82F9BE4D] flex flex-col gap-3 mx-6 md:mx-0 p-4 pb-0">
    <div class="flex items-start gap-2 rounded-lg">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path
          d="M8.6 14.6L15.65 7.55L14.25 6.15L8.6 11.8L5.75 8.95L4.35 10.35L8.6 14.6ZM10 20C4.477 20 0 15.523 0 10S4.477 0 10 0 20 4.477 20 10 15.523 20 10 20Z"
          fill="#005235"
        />
      </svg>

      <p class="text-green text-xs leading-5">
        If an account exists with this email, we've sent a password reset link.
      </p>
    </div>
    <div class="flex justify-center items-center gap-4 border-t border-[#C3C6D626] py-3">
      <p class="text-center text-2xs uppercase text-[#00523599] weight-bold tracking-wide">Didn't receive email?</p>

      <button class="flex h-6 items-center justify-center text-primary weight-bold tracking-wide" disabled>
        Resend in 05:00
      </button>
    </div>
  </div>
} @else {
  <app-form-layout
    title="Forgot password?"
    description="No worries, we'll send you reset instructions."
    contentClass="p-6 md:p-10"
    titleClass="text-center md:text-start"
    descriptionClass="text-center md:text-start"
    containerClass="bg-white"
  >
    <div class="flex flex-col gap-6">
      <app-input label="Email Address" placeholder="Enter your email" type="email" formControlName="email" />

      <button class="btn btn-primary w-full">Send Reset Link</button>

      <a class="flex items-center justify-center gap-2 text-primary text-xs weight-medium cursor-pointer">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3.825 9L9.425 14.6L8 16L0 8L8 0L9.425 1.4L3.825 7H16V9H3.825Z" fill="currentColor" />
        </svg>

        <span>Back to log in</span>
      </a>
    </div>

    <!-- Bottom Section -->
    <div class="mt-10 border-t border-[#C3C6D626] pt-10 flex flex-col gap-8">
      <div class="flex items-center gap-3 rounded-lg bg-success/15 px-5 py-4">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path
            d="M8.6 14.6L15.65 7.55L14.25 6.15L8.6 11.8L5.75 8.95L4.35 10.35L8.6 14.6ZM10 20C4.477 20 0 15.523 0 10S4.477 0 10 0 20 4.477 20 10 15.523 20 10 20Z"
            fill="#005235"
          />
        </svg>

        <p class="text-green text-xs leading-5">
          If an account exists with this email, we've sent a password reset link.
        </p>
      </div>

      <!-- Resend -->
      <div class="flex flex-col gap-4">
        <p class="text-center text-2xs uppercase tracking-[1px] weight-bold text-on-surface-variant">
          Didn't receive the email?
        </p>

        <button
          class="flex h-12 w-full items-center justify-center gap-2 rounded-lg bg-surface-low text-on-surface-variant weight-medium"
          disabled
        >
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path
              d="M10 18C5.582 18 2 14.418 2 10S5.582 2 10 2 18 5.582 18 10"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path d="M10 6V10L13 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>

          <span>Resend in 05:00</span>
        </button>
      </div>
    </div>
  </app-form-layout>
}
