<div class="flex flex-col gap-6 min-h-[726.5px]">
  <header class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
      <h1 class="text-3xl font-semibold text-neutral-dark">Projects</h1>
      <p class="text-[#434654]">Manage and curate your projects</p>
    </div>

    <button class="btn btn-primary bg-gradient-primary hidden md:flex">+ Create New Project</button>
  </header>

  <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
    @for (project of projects; track $index) {
      <app-project-card />
    }

    <button
      class="min-h-52.5 border-2 border-dashed border-[#C3C6D633] rounded-xl bg-white hidden md:flex flex-col justify-center items-center gap-3 cursor-pointer"
    >
      <span class="w-10.5 h-10.5 rounded-full bg-[#eef4ff] flex items-center justify-center text-[22px]"> + </span>

      <span class="text-xs font-bold uppercase text-[#434654] tracking-wide"> Add Project </span>
    </button>
  </section>

  <div class="flex justify-end md:hidden">
    <button
      class="w-14 h-14 rounded-xl bg-primary gradient-primary text-white text-2xl shadow-lg flex items-center justify-center"
    >
      +
    </button>
  </div>

  <app-pagination />
</div>
