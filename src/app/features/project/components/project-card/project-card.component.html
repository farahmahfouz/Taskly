<div class="flex flex-col gap-6 p-6 min-h-55 bg-white rounded-lg cursor-pointer">
  <div class="flex items-start justify-between gap-4">
    <h3 class="text-sm leading-7 weight-medium">
      {{ project.name }}
    </h3>

    <div class="relative" (appClickOutside)="isMenuOpen = false" appClickOutside>
      <button type="button" class="cursor-pointer p-1 rounded" (click)="toggleMenu()">
        <svg icon-edit class="text-neutral-light size-3" />
      </button>

      @if (isMenuOpen) {
        <div class="absolute right-0 top-8 z-10 w-32 rounded-lg bg-white shadow-lg">
          <button
            class="w-full px-4 py-2 text-left hover:bg-neutral-light/20 hover:rounded-lg cursor-pointer"
            (click)="goToMembers()"
          >
            Details
          </button>
          <button
            class="w-full px-4 py-2 text-left hover:bg-neutral-light/20 hover:rounded-lg cursor-pointer"
            (click)="editProject()"
          >
            Edit Project
          </button>
        </div>
      }
    </div>
  </div>

  <p class="text-regular text-xs leading-5.5 text-[#434654]">
    {{ project.description }}
  </p>

  <div class="mt-auto pt-4 border-t border-[#C3C6D61A] flex justify-between">
    <span class="text-[#737685] uppercase text-2xs weight-bold tracking-tighter leading-2xs">CREATED AT</span>
    <span class="text-[#434654] weight-medium text-xs">{{ project.created_at | date: 'dd MMM yyyy' }}</span>
  </div>
</div>
