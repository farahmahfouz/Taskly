<div class="border border-[#C3C6D626] rounded-sm flex flex-col">
  @for (i of [1, 2, 3]; track i) {
    <div
      class="flex justify-between items-center p-4 pe-11 animate-pulse"
      [class.border-b]="i !== 3"
      [class.border-[#C3C6D626]]="i !== 3"
    >
      <div class="flex flex-col gap-1.5 w-1/2">
        <div class="h-3 bg-[#E8EDFF] rounded w-3/4"></div>
        <div class="h-3 bg-[#E8EDFF] rounded w-1/3"></div>
      </div>
      <div class="h-3 bg-[#E8EDFF] rounded w-14"></div>
    </div>
  }
</div>
