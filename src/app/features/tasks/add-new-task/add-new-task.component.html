<div class="min-h-dvh pb-40 md:pb-0 pt-2 w-full max-w-232 mx-auto ">
  <div class="flex flex-col gap-6 md:gap-8">
    <div class="hidden md:flex text-2xs weight-bold leading-2xs tracking-wide gap-2 capitalize">
      <a routerLink="/project" class="text-neutral-light">PROJECTS</a>
      <span class="text-neutral-light">›</span>
      <a routerLink="/project" class="text-neutral-light"> projectName </a>
      <span class="text-neutral-light">›</span>
      <a routerLink="../" class="text-neutral-light">tasks</a>
      <span class="text-neutral-light">›</span>
      <p class="text-primary">new task</p>
    </div>
    <div class="flex flex-col gap-2">
      <h1
        class="text-2xl md:text-4xl weight-semibold md:weight-bold text-[#041B3C] leading-8 md:leading-10 tracking-[-0.6px] md:tracking-[-0.9px]"
      >
        Create New Epic
      </h1>
      <p class="text-dark weight-regular text-xs leading-xs">
        Initialize a new work item within the Architectural Workspace ecosystem.
      </p>
    </div>
    <form
      (ngSubmit)="onSubmit()"
      [formGroup]="taskForm"
      class="flex flex-col gap-8 rounded-lg bg-background md:bg-white md:border border-[#C3C6D61A] md:shadow-[0px_24px_48px_-12px_#041B3C0F] md:p-8 md:py-10"
    >
      <app-input
        label="title"
        [required]="true"
        placeholder="e.g., Finalize structural schematics"
        formControlName="title"
        [errorMessage]="getError('title')"
      />

      <div class="flex flex-col md:flex-row md:justify-between gap-6 md:gap-8">
        <div class="w-full">
          <label class="control-label">Status<span class="text-error ml-1">*</span></label>

          <select class="input" formControlName="status">
            @for (stat of status; track stat.value) {
              <option [value]="stat.value">
                {{ stat.label }}
              </option>
            }
          </select>
        </div>
        <div class="w-full">
          <label class="control-label">Assignee</label>

          <select class="input" formControlName="assignee_id">
            <option value="" disabled selected>Select a member</option>
            @for (member of members; track member.member_id) {
              <option [value]="member.user_id">
                {{ member.metadata.name }}
              </option>
            }
          </select>
        </div>
      </div>

      <div class="w-full">
        <label class="control-label">Epic</label>

        <select class="input" formControlName="epic_id">
          <option value="">No Epic</option>

          @for (epic of epics; track epic.id) {
            <option [value]="epic.id">
              {{ epic.epic_id }}
              {{ epic.title.length > 100 ? (epic.title | slice: 0 : 100) + '...' : epic.title }}
            </option>
          }
        </select>
      </div>

      <div class="w-full">
        <label class="control-label">Due Date</label>
        <input type="date" class="input" formControlName="due_date" />
      </div>

      <app-textarea
        formControlName="description"
        label="DESCRIPTION"
        [rows]="4"
        placeholder="Provide detailed context for this task..."
      />

      <div
        class="fixed bottom-0 left-0 right-0 z-50 bg-white p-4  shadow-[0px_-8px_24px_0px_#041B3C0F] md:static md:bg-transparent md:p-0 md:shadow-none flex flex-col md:flex-row md:justify-end md:items-center gap-4 md:my-2"
      >
        <a routerLink="../" class="btn btn-secondary md:btn-ghost w-full md:w-auto order-2 md:order-1 text-center">
          Back
        </a>

        <button type="submit" class="btn btn-primary gradient-primary w-full md:w-auto order-1 md:order-2">
          {{ isLoading ? 'Loading...' : 'Create Task' }}
        </button>
      </div>
    </form>
  </div>
</div>
