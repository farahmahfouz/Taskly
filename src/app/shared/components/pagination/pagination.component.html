<footer class="hidden md:flex justify-between items-center p-8 pt-12 my-24 text-dark">
  <p>Showing {{ showingCount }} of {{ totalCount }} active projects</p>

  <div class="pagination">
    <button (click)="previousPage()" [disabled]="currentPage === 1">‹</button>

    @for (page of pages; track page) {
      <button (click)="goToPage(page)" [class.active]="page === currentPage">
        {{ page }}
      </button>
    }

    <button (click)="nextPage()" [disabled]="currentPage === totalPages">›</button>
  </div>
</footer>
