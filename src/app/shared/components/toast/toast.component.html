@if (toast.message()) {
  <div class="fixed top-6 right-6 z-9999">
    <div
      class="flex items-center gap-4 px-6 py-4 rounded-2xl shadow-lg bg-white/80 backdrop-blur-sm border border-gray-300 w-fit max-w-sm"
    >
      <div
        class="flex items-center justify-center w-10 h-10 rounded-full overflow-hidden"
        [ngClass]="{
          'text-green-600 bg-green-100': toast.type() === 'success',
          'text-red-600 bg-red-100': toast.type() === 'error',
        }"
      >
        @if (toast.type() === 'success') {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        }
      </div>

      <p class="text-xs font-semibold text-gray-800">
        {{ toast.message() }}
      </p>
    </div>
  </div>
}
