@if (isOpen) {
  <div
    class="fixed inset-0 z-10 flex items-center justify-center bg-[#041B3C66] backdrop-blur-xs p-4"
    (click)="close.emit()"
  >
    <div
      class="max-h-fit rounded-lg overflow-hidden bg-white shadow-[0px_25px_50px_-12px_#00000040]"
      (click)="$event.stopPropagation()"
      [style.width]="width"
      style="max-width: calc(100vw - 2rem)"
    >
      <ng-content></ng-content>
    </div>
  </div>
}
