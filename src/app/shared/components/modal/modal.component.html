@if (isOpen) {
  <div
    class="fixed inset-0 z-10 flex items-center justify-center bg-[#041B3C66] backdrop-blur-xs p-4"
    (click)="close.emit()"
  >
    <div
      class="w-full max-w-2xl max-h-fit rounded-lg bg-white p-6 md:p-8 shadow-[0px_25px_50px_-12px_#00000040]"
      (click)="$event.stopPropagation()"
    >
      <ng-content></ng-content>
    </div>
  </div>
}
