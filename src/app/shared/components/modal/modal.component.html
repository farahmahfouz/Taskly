@if (isOpen) {
  <div
    class="fixed inset-0 z-10 flex items-center justify-center bg-[#041B3C66] backdrop-blur-xs"
    (click)="close.emit()"
  >
    <div
      class="w-full max-w-2xl rounded-lg p-8 bg-white shadow-[0px 25px 50px -12px #00000040]"
      (click)="$event.stopPropagation()"
    
    >
      <ng-content></ng-content>
    </div>
  </div>
}
